<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Museums</title>
    <link rel="stylesheet" href="style.css">
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.3.0/model-viewer.min.js"></script>
</head>
<body>
    <div id="landing-page">
        <header class="landing-header">
            <h1>Digital Museum</h1>
            <p>when every click mattered</p>
        </header>
        <div class="image-gallery">
            <img src="2.png" alt="Vintage Camera 1" class="gallery-image tall">
            <img src="3.png" alt="Vintage Camera 2" class="gallery-image wide">
            <img src="4.png" alt="Vintage Camera 3" class="gallery-image">
            <img src="5.png" alt="Vintage Camera 4" class="gallery-image wide">
            <img src="6.png" alt="Vintage Camera 5" class="gallery-image">
            <img src="7.png" alt="Vintage Camera 6" class="gallery-image tall">
            <img src="8.png" alt="Vintage Camera 7" class="gallery-image">
            <img src="9.png" alt="Vintage Camera 8" class="gallery-image wide">
            <img src="10.png" alt="Vintage Camera 9" class="gallery-image">
            <img src="11.png" alt="Vintage Camera 10" class="gallery-image">
        </div>
        <button id="enter-museum-btn" class="enter-btn">Enter Museum</button>
    </div>

    <div id="museum-page" class="museum-container" style="display: none;">
            <button id="back-to-landing" class="home-btn">Home</button>

            <header class="museum-header">
                <h1>Digital Museum</h1>
                <p>When every CLICK matters ...</p>
            </header>

            <button class="nav-btn left" id="prev-btn" aria-label="Previous Model">&larr;</button>
            <button class="nav-btn right" id="next-btn" aria-label="Next Model">&rarr;</button>

            <div class="model-wrapper" id="model-wrapper">
                <div class="polaroid-container" id="polaroid-container">
                    <div class="polaroid-inner" id="polaroid-inner">
                        <div class="polaroid-front">
                            <div class="photo-area"></div>
                            <div id="polaroid-caption-text" class="polaroid-caption">Example</div>
                        </div>
                        <div class="polaroid-back">
                            <p id="model-info">Information</p>
                        </div>
                    </div>
                </div>
                <model-viewer id="museum-model" 
                              src="100.glb"
                              camera-controls 
                              interaction-prompt="none"
                              camera-orbit="90deg 90deg auto"
                              shadow-intensity="1">
                </model-viewer>
            </div>

            <div class="controls">
                <button id="insert-film-btn" style="display: block;">Insert Film</button>
                <button id="shutter-btn" style="display: none;">Click Shutter</button>
                <button id="info-btn" style="display: none;">Information</button>
            </div>
    </div>

    <audio id="shutter-sound" src="shutter%20sound.mp3"></audio>
    <script src="script.js"></script>
</body>
</html>
